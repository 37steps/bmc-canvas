<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business Model Canvas — לוח שיתופי</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
/* ── Reset & Vars ───────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #ede8de;
  --surface:  #faf8f3;
  --border:   #cec5b2;
  --text:     #25201a;
  --muted:    #8a7d6a;
  --accent:   #2c5f8a;
  --hdr:      52px;
  --gap:      7px;
  --radius:   9px;

  /* block accent colors */
  --col-partners:     #7b5c30;
  --col-activities:   #1b7a5c;
  --col-resources:    #c06000;
  --col-value:        #1e4d96;
  --col-relationships:#7a2080;
  --col-channels:     #3a2090;
  --col-segments:     #207830;
  --col-costs:        #505050;
  --col-revenue:      #1a6830;

  /* note colors */
  --note-yellow: #fff8a0;
  --note-pink:   #ffc8dc;
  --note-blue:   #a8dcf8;
  --note-green:  #b0eebc;
  --note-orange: #ffd090;
  --note-purple: #dbb8f4;
}

html, body {
  height: 100%;
  font-family: 'Heebo', sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
}

/* ── Header ─────────────────────────────────────────────────── */
header {
  position: fixed;
  inset: 0 0 auto 0;
  height: var(--hdr);
  background: #16192a;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 18px;
  z-index: 50;
  box-shadow: 0 3px 18px rgba(0,0,0,.35);
}

.logo {
  font-size: 1.15rem;
  font-weight: 900;
  color: #e8d5a0;
  letter-spacing: -.01em;
  flex-shrink: 0;
}
.logo em { color: #5b9cd5; font-style: normal; }

.room-pill {
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(255,255,255,.07);
  border: 1px solid rgba(255,255,255,.12);
  border-radius: 20px;
  padding: 5px 14px;
  cursor: pointer;
  transition: background .2s;
  margin: 0 14px;
}
.room-pill:hover { background: rgba(255,255,255,.13); }

.room-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #888;
  flex-shrink: 0;
  transition: background .3s;
}
.room-dot.online  { background: #4caf50; }
.room-dot.connecting { background: #ff9800; animation: blink 1s infinite; }

@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

.room-label { font-size: .82rem; color: rgba(255,255,255,.7); }
.room-count { font-size: .76rem; color: #81c784; margin-right: 4px; }

.hdr-actions { display: flex; gap: 8px; }

.btn {
  display: flex; align-items: center; gap: 5px;
  padding: 7px 14px;
  border-radius: 7px;
  border: none;
  cursor: pointer;
  font-family: 'Heebo', sans-serif;
  font-size: .84rem;
  font-weight: 500;
  transition: all .15s;
  white-space: nowrap;
}
.btn-ghost {
  background: rgba(255,255,255,.08);
  color: rgba(255,255,255,.7);
  border: 1px solid rgba(255,255,255,.12);
}
.btn-ghost:hover { background: rgba(255,255,255,.15); color: #fff; }

.btn-wind {
  background: rgba(100,200,255,.1);
  color: #7dd4f8;
  border: 1px solid rgba(100,200,255,.18);
  letter-spacing: .02em;
}
.btn-wind:hover { background: rgba(100,200,255,.2); }
.btn-wind:active { transform: scale(.94); }
.btn-wind:disabled { opacity: .35; cursor: default; }

.btn-clear {
  background: rgba(220,80,60,.14);
  color: #ff9e9e;
  border: 1px solid rgba(220,80,60,.22);
}
.btn-clear:hover { background: rgba(220,80,60,.26); }

/* ── BMC Wrapper ────────────────────────────────────────────── */
#wrap {
  margin-top: var(--hdr);
  height: calc(100vh - var(--hdr));
  overflow: auto;
  padding: 10px;
}

/* ── BMC Grid (LTR override so standard layout is preserved) ── */
.bmc-grid {
  direction: ltr;
  display: grid;
  grid-template-columns: repeat(10, 1fr);
  grid-template-rows: minmax(190px,1fr) minmax(190px,1fr) minmax(170px,auto);
  gap: var(--gap);
  min-height: calc(100vh - var(--hdr) - 20px);
}

/* block grid positions */
.b-partners      { grid-column: 1/3;   grid-row: 1/3; }
.b-activities    { grid-column: 3/5;   grid-row: 1;   }
.b-resources     { grid-column: 3/5;   grid-row: 2;   }
.b-value         { grid-column: 5/7;   grid-row: 1/3; }
.b-relationships { grid-column: 7/9;   grid-row: 1;   }
.b-channels      { grid-column: 7/9;   grid-row: 2;   }
.b-segments      { grid-column: 9/11;  grid-row: 1/3; }
.b-costs         { grid-column: 1/6;   grid-row: 3;   }
.b-revenue       { grid-column: 6/11;  grid-row: 3;   }

/* ── Block ──────────────────────────────────────────────────── */
.block {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
  transition: box-shadow .2s;
}
.block:hover { box-shadow: 0 4px 20px rgba(0,0,0,.13); }

.block-hdr {
  direction: rtl;
  padding: 9px 11px 7px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: flex-start;
  gap: 7px;
  flex-shrink: 0;
  border-top: 3px solid var(--accent-col, #888);
}

.b-partners      .block-hdr { --accent-col: var(--col-partners);     background: rgba(123,92,48,.04);  }
.b-activities    .block-hdr { --accent-col: var(--col-activities);   background: rgba(27,122,92,.04);  }
.b-resources     .block-hdr { --accent-col: var(--col-resources);    background: rgba(192,96,0,.04);   }
.b-value         .block-hdr { --accent-col: var(--col-value);        background: rgba(30,77,150,.05);  }
.b-relationships .block-hdr { --accent-col: var(--col-relationships); background: rgba(122,32,128,.04);}
.b-channels      .block-hdr { --accent-col: var(--col-channels);     background: rgba(58,32,144,.04);  }
.b-segments      .block-hdr { --accent-col: var(--col-segments);     background: rgba(32,120,48,.04);  }
.b-costs         .block-hdr { --accent-col: var(--col-costs);        background: rgba(80,80,80,.03);   }
.b-revenue       .block-hdr { --accent-col: var(--col-revenue);      background: rgba(26,104,48,.04);  }

.block-icon { font-size: 1.25rem; flex-shrink: 0; line-height: 1; }
.block-titles { flex: 1; min-width: 0; }
.title-he { display: block; font-size: .84rem; font-weight: 700; line-height: 1.2; }
.title-en { display: block; font-size: .67rem; color: var(--muted); font-weight: 400; margin-top: 1px; }

/* ── Notes Container ────────────────────────────────────────── */
.block-body {
  flex: 1;
  direction: rtl;
  padding: 7px;
  overflow-y: auto;
  display: flex;
  flex-wrap: wrap;
  align-content: flex-start;
  gap: 5px;
}
.block-body::-webkit-scrollbar { width: 3px; }
.block-body::-webkit-scrollbar-thumb { background: rgba(0,0,0,.15); border-radius: 2px; }

.empty-hint {
  width: 100%;
  padding: 14px 8px;
  text-align: center;
  font-size: .76rem;
  color: var(--muted);
  opacity: .6;
  pointer-events: none;
}

/* ── Add Button ─────────────────────────────────────────────── */
.add-btn {
  position: absolute;
  bottom: 7px;
  left: 7px;
  background: rgba(44,95,138,.1);
  border: 1.5px dashed rgba(44,95,138,.4);
  color: var(--accent);
  border-radius: 6px;
  padding: 3px 10px;
  font-size: .76rem;
  font-family: 'Heebo', sans-serif;
  font-weight: 600;
  cursor: pointer;
  opacity: 0;
  transition: opacity .15s, background .15s;
}
.block:hover .add-btn { opacity: 1; }
.add-btn:hover { background: rgba(44,95,138,.2); }

/* ── Sticky Note ────────────────────────────────────────────── */
.note {
  position: relative;
  direction: rtl;
  text-align: right;
  border-radius: 4px;
  padding: 7px 24px 7px 7px;
  font-size: .79rem;
  line-height: 1.5;
  word-break: break-word;
  cursor: pointer;
  min-width: 76px;
  max-width: calc(50% - 3px);
  box-shadow: 1px 2px 5px rgba(0,0,0,.16), 0 0 0 1px rgba(0,0,0,.06);
  transition: transform .15s, box-shadow .15s;
  animation: pop .22s ease both;
}
@keyframes pop {
  from { opacity: 0; transform: scale(.82) translateY(8px); }
  to   { opacity: 1; transform: scale(1)  translateY(0);    }
}

/* ── Falling note animation ── */
@keyframes note-leaf {
  0%   { transform: translate(0px,    0px)   rotate(0deg);    opacity: 1;   }
  8%   { transform: translate(-6px,   18px)  rotate(-8deg);   opacity: 1;   }
  18%  { transform: translate(10px,   55px)  rotate(6deg);    opacity: 1;   }
  30%  { transform: translate(-14px,  110px) rotate(-12deg);  opacity: .95; }
  42%  { transform: translate(16px,   175px) rotate(9deg);    opacity: .85; }
  55%  { transform: translate(-18px,  240px) rotate(-14deg);  opacity: .7;  }
  68%  { transform: translate(12px,   295px) rotate(7deg);    opacity: .5;  }
  82%  { transform: translate(-10px,  340px) rotate(-10deg);  opacity: .25; }
  100% { transform: translate(6px,    390px) rotate(5deg);    opacity: 0;   }
}
@keyframes note-return {
  from { transform: translateY(-16px) rotate(-4deg); opacity: 0; }
  to   { transform: translateY(0)     rotate(0deg);  opacity: 1; }
}
.note.falling {
  animation: note-leaf 2.4s cubic-bezier(.3,.1,.4,1) forwards !important;
  z-index: 10;
  pointer-events: none;
}
.note.returning {
  animation: note-return .45s cubic-bezier(.2,.8,.3,1.2) forwards !important;
}
.note:hover {
  transform: translateY(-2px) rotate(-.4deg);
  box-shadow: 2px 5px 14px rgba(0,0,0,.22);
  z-index: 2;
}

/* note colors */
.nc-yellow { background: var(--note-yellow); }
.nc-pink   { background: var(--note-pink);   }
.nc-blue   { background: var(--note-blue);   }
.nc-green  { background: var(--note-green);  }
.nc-orange { background: var(--note-orange); }
.nc-purple { background: var(--note-purple); }

/* folded corner effect */
.note::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0;
  width: 10px; height: 10px;
  background: linear-gradient(225deg, transparent 50%, rgba(0,0,0,.09) 50%);
}

.note-del {
  position: absolute;
  top: 3px; right: 3px;
  width: 17px; height: 17px;
  border-radius: 50%;
  border: none;
  background: rgba(0,0,0,.13);
  color: rgba(0,0,0,.45);
  font-size: .68rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  opacity: 0;
  transition: opacity .15s, background .15s;
  line-height: 1;
}
.note:hover .note-del { opacity: 1; }
.note-del:hover { background: rgba(180,0,0,.28); color: #900; }

.note-author {
  display: block;
  font-size: .64rem;
  opacity: .45;
  margin-top: 3px;
}

/* ── Modal Overlay ──────────────────────────────────────────── */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.52);
  backdrop-filter: blur(4px);
  z-index: 200;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity .2s;
}
.overlay.open { opacity: 1; pointer-events: all; }

.modal {
  direction: rtl;
  background: #fff;
  border-radius: 16px;
  padding: 24px;
  width: 420px;
  max-width: calc(100vw - 24px);
  max-height: calc(100vh - 60px);
  overflow-y: auto;
  box-shadow: 0 24px 70px rgba(0,0,0,.3);
  transform: scale(.93) translateY(12px);
  transition: transform .2s;
}
.overlay.open .modal { transform: scale(1) translateY(0); }

.modal-title {
  font-size: .96rem;
  font-weight: 700;
  margin-bottom: 14px;
  color: var(--text);
}
.modal-block-name {
  font-weight: 400;
  color: var(--muted);
}

.modal textarea {
  width: 100%;
  min-height: 96px;
  border: 1.5px solid var(--border);
  border-radius: 9px;
  padding: 10px 12px;
  font-family: 'Heebo', sans-serif;
  font-size: .93rem;
  resize: vertical;
  outline: none;
  direction: rtl;
  line-height: 1.55;
  transition: border-color .15s;
}
.modal textarea:focus { border-color: var(--accent); }

.color-row {
  display: flex;
  align-items: center;
  gap: 9px;
  margin-top: 14px;
  flex-wrap: wrap;
}
.color-label { font-size: .8rem; color: var(--muted); margin-left: auto; }

.cdot {
  width: 27px; height: 27px;
  border-radius: 50%;
  cursor: pointer;
  border: 2.5px solid transparent;
  transition: transform .15s, border-color .15s;
}
.cdot:hover { transform: scale(1.14); }
.cdot.sel { border-color: #333; transform: scale(1.1); }

.modal-foot {
  display: flex;
  gap: 9px;
  justify-content: flex-end;
  margin-top: 18px;
}

.btn-save {
  background: var(--accent);
  color: #fff;
  border: none;
  padding: 9px 20px;
  border-radius: 9px;
  font-family: 'Heebo', sans-serif;
  font-size: .9rem;
  font-weight: 700;
  cursor: pointer;
  transition: background .15s;
}
.btn-save:hover { background: #1e4068; }
.btn-save:disabled { opacity: .4; cursor: default; }

.btn-can {
  background: transparent;
  color: var(--muted);
  border: 1.5px solid var(--border);
  padding: 9px 16px;
  border-radius: 9px;
  font-family: 'Heebo', sans-serif;
  font-size: .9rem;
  cursor: pointer;
  transition: background .15s;
}
.btn-can:hover { background: var(--bg); }

/* ── Extra note fields (metric + SWOT) ──────────────────────── */
.field-section {
  margin-top: 14px;
}
.field-label {
  display: block;
  font-size: .8rem;
  color: var(--muted);
  font-weight: 600;
  margin-bottom: 5px;
}
.field-input {
  width: 100%;
  border: 1.5px solid var(--border);
  border-radius: 9px;
  padding: 8px 12px;
  font-family: 'Heebo', sans-serif;
  font-size: .88rem;
  outline: none;
  direction: rtl;
  transition: border-color .15s;
  background: #fafafa;
}
.field-input:focus { border-color: var(--accent); }

.swot-btns { display: flex; gap: 7px; }
.swot-btn {
  flex: 1;
  padding: 7px 0;
  border-radius: 7px;
  border: 1.5px solid var(--border);
  background: #f5f5f5;
  font-family: 'Heebo', sans-serif;
  font-size: .95rem;
  font-weight: 700;
  cursor: pointer;
  transition: all .15s;
  color: var(--muted);
}
.swot-btn:hover { background: #eee; color: var(--text); }
.swot-btn.sel[data-s="S"] { background: #d4f4e2; border-color: #2e9a5c; color: #1a6b3a; }
.swot-btn.sel[data-s="W"] { background: #fde8e8; border-color: #c94040; color: #8b1a1a; }
.swot-btn.sel[data-s="O"] { background: #dbeeff; border-color: #2878c8; color: #1a4a80; }
.swot-btn.sel[data-s="T"] { background: #fff3d4; border-color: #c87a20; color: #7a4a00; }

.swot-question { margin-top: 9px; }
.swot-q-label {
  display: block;
  font-size: .79rem;
  color: var(--muted);
  font-style: italic;
  margin-bottom: 5px;
}

/* ── Toast ──────────────────────────────────────────────────── */
.toast {
  position: fixed;
  bottom: 22px;
  left: 50%;
  transform: translateX(-50%) translateY(18px);
  background: #16192a;
  color: #fff;
  padding: 11px 20px;
  border-radius: 10px;
  font-size: .85rem;
  opacity: 0;
  transition: all .3s;
  z-index: 300;
  pointer-events: none;
  white-space: nowrap;
  box-shadow: 0 8px 30px rgba(0,0,0,.3);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── Drag over highlight ─────────────────────────────────────── */
.block.drag-over { background: rgba(44,95,138,.07); }

/* ── Texture overlay on bmc bg ──────────────────────────────── */
#wrap {
  background:
    linear-gradient(rgba(120,110,90,.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(120,110,90,.05) 1px, transparent 1px),
    var(--bg);
  background-size: 22px 22px;
}

/* ── Responsive ─────────────────────────────────────────────── */
@media (max-width: 880px) {
  .bmc-grid {
    grid-template-columns: 1fr 1fr;
    grid-template-rows: none;
  }
  .b-partners, .b-activities, .b-resources,
  .b-value, .b-relationships, .b-channels,
  .b-segments { grid-column: auto; grid-row: auto; }
  .b-costs, .b-revenue { grid-column: span 2; }
  body, html { overflow: auto; }
  #wrap { height: auto; overflow: auto; }
}
</style>
</head>
<body>

<!-- ── Header ── -->
<header>
  <div class="logo">BMC</div>

  <div class="room-pill" id="room-pill" onclick="copyLink()" title="לחץ להעתקת קישור שיתוף">
    <div class="room-dot connecting" id="rdot"></div>
    <span class="room-label" id="rlabel">מתחבר...</span>
    <span class="room-count" id="rcount"></span>
  </div>

  <div class="hdr-actions" id="hdr-actions" style="display:none">
    <button class="btn btn-ghost" onclick="copyLink()">🔗 שתף קישור</button>
    <button class="btn btn-ghost" onclick="exportCSV()">⬇️ ייצא CSV</button>
    <button class="btn btn-wind" id="btn-wind" onclick="triggerWind()" title="פתח חלון">💨 רוח</button>
    <button class="btn btn-clear" onclick="clearAll()">🗑 נקה לוח</button>
  </div>
</header>

<!-- ── BMC Grid ── -->
<div id="wrap">
  <div class="bmc-grid" id="grid"></div>
</div>

<!-- ── Note Modal ── -->
<div class="overlay" id="overlay" onclick="onOverlayClick(event)">
  <div class="modal">
    <div class="modal-title">
      <span id="modal-verb">פתק חדש</span>
      <span class="modal-block-name" id="modal-block-name"></span>
    </div>
    <textarea id="ntxt" placeholder="כתוב כאן... (Ctrl+Enter לשמירה)"></textarea>
    <div class="color-row">
      <span class="color-label">צבע:</span>
      <div class="cdot sel" data-c="yellow" style="background:var(--note-yellow)" onclick="pickColor('yellow',this)"></div>
      <div class="cdot"     data-c="pink"   style="background:var(--note-pink)"   onclick="pickColor('pink',this)"></div>
      <div class="cdot"     data-c="blue"   style="background:var(--note-blue)"   onclick="pickColor('blue',this)"></div>
      <div class="cdot"     data-c="green"  style="background:var(--note-green)"  onclick="pickColor('green',this)"></div>
      <div class="cdot"     data-c="orange" style="background:var(--note-orange)" onclick="pickColor('orange',this)"></div>
      <div class="cdot"     data-c="purple" style="background:var(--note-purple)" onclick="pickColor('purple',this)"></div>
    </div>
    <div class="field-section">
      <label class="field-label">מדד הצלחה — איך נדע שהגענו ליעד?</label>
      <input class="field-input" type="text" id="nmetric" placeholder="לדוגמה: 100 לקוחות חדשים בחודש">
    </div>
    <div class="field-section">
      <label class="field-label">SWOT</label>
      <div class="swot-btns">
        <button type="button" class="swot-btn" data-s="S" onclick="pickSwot('S',this)">S</button>
        <button type="button" class="swot-btn" data-s="W" onclick="pickSwot('W',this)">W</button>
        <button type="button" class="swot-btn" data-s="O" onclick="pickSwot('O',this)">O</button>
        <button type="button" class="swot-btn" data-s="T" onclick="pickSwot('T',this)">T</button>
      </div>
      <div class="swot-question" id="swot-question" style="display:none">
        <label class="swot-q-label" id="swot-q-label"></label>
        <input class="field-input" type="text" id="nswot-answer" placeholder="כתוב כאן...">
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn-can" onclick="closeModal()">ביטול</button>
      <button class="btn-save" id="btn-save" onclick="saveNote()">הוסף פתק ✓</button>
    </div>
  </div>
</div>

<!-- ── Toast ── -->
<div class="toast" id="toast"></div>

<script>
/* ══════════════════════════════════════════════════════════════
   DATA
══════════════════════════════════════════════════════════════ */
const BLOCKS = [
  { key:'partners',      he:'שותפויות מרכזיות', en:'Key Partners',          icon:'🤝', css:'b-partners',      hint:'מי השותפים שלנו?'        },
  { key:'activities',    he:'פעילויות מרכזיות', en:'Key Activities',         icon:'⚙️', css:'b-activities',    hint:'מה אנחנו עושים?'         },
  { key:'resources',     he:'משאבים מרכזיים',  en:'Key Resources',          icon:'🔩', css:'b-resources',     hint:'מה יש לנו?'              },
  { key:'value',         he:'הצעת ערך',         en:'Value Propositions',     icon:'💎', css:'b-value',         hint:'מה אנחנו מציעים?'        },
  { key:'relationships', he:'קשרי לקוחות',      en:'Customer Relationships', icon:'💬', css:'b-relationships', hint:'איך מתקשרים עם לקוחות?'  },
  { key:'channels',      he:'ערוצי הפצה',       en:'Channels',               icon:'📡', css:'b-channels',      hint:'דרך מה מגיעים ללקוחות?' },
  { key:'segments',      he:'מקבלי ערך',        en:'Customer Segments',      icon:'👥', css:'b-segments',      hint:'מי מקבלי הערך שלנו?'     },
  { key:'costs',         he:'מבנה עלויות',      en:'Cost Structure',         icon:'💸', css:'b-costs',         hint:'מה עולה לנו?'            },
  { key:'revenue',       he:'מודל עסקי',         en:'Revenue Streams',        icon:'💰', css:'b-revenue',       hint:'מה המודל העסקי שלנו?'    },
];

const ANIMALS = ['Tiger 🐅','Lion 🦁','Fox 🦊','Wolf 🐺','Dolphin 🐬','Eagle 🦅','Bear 🐻','Owl 🦉','Panda 🐼','Koala 🐨'];
const myName  = ANIMALS[Math.floor(Math.random() * ANIMALS.length)];

const SWOT_Q = {
  S: 'איך אפשר להשתמש בחוזקה?',
  W: 'איך אפשר לחפות על החולשה?',
  O: 'איך אפשר לנצל את ההזדמנות?',
  T: 'איך אפשר לנטרל את האיום?'
};

let notes         = JSON.parse(localStorage.getItem('bmc_v2') || '[]');
let editId        = null;
let activeBlock   = null;
let chosenColor   = 'yellow';
let chosenSwot    = null;
let draggingId    = null;

/* ══════════════════════════════════════════════════════════════
   RENDER
══════════════════════════════════════════════════════════════ */
function buildGrid() {
  const g = document.getElementById('grid');
  g.innerHTML = BLOCKS.map(b => `
    <div class="block ${b.css}"
         data-key="${b.key}"
         ondragover="onDragOver(event,'${b.key}')"
         ondragleave="onDragLeave(event)"
         ondrop="onDrop(event,'${b.key}')">
      <div class="block-hdr">
        <span class="block-icon">${b.icon}</span>
        <div class="block-titles">
          <span class="title-he">${b.he}</span>
          <span class="title-en">${b.en}</span>
        </div>
      </div>
      <div class="block-body" id="bb-${b.key}"></div>
      <button class="add-btn" onclick="openModal('${b.key}')">＋ פתק</button>
    </div>
  `).join('');
  renderNotes();
}

function renderNotes() {
  BLOCKS.forEach(b => {
    const el = document.getElementById('bb-' + b.key);
    if (!el) return;
    const list = notes.filter(n => n.bk === b.key);
    if (!list.length) {
      el.innerHTML = `<div class="empty-hint">${b.hint}</div>`;
      return;
    }
    el.innerHTML = list.map(n => `
      <div class="note nc-${n.color}"
           data-id="${n.id}"
           draggable="true"
           ondragstart="onDragStart(event,'${n.id}')"
           ondragend="onDragEnd(event)"
           onclick="openEdit('${n.id}')">
        <button class="note-del" onclick="delNote(event,'${n.id}')">✕</button>
        ${esc(n.text)}
        <span class="note-author">${esc(n.author)}</span>
      </div>
    `).join('');
  });
}

const esc = s => s
  .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
  .replace(/\n/g,'<br>');

function persist() { localStorage.setItem('bmc_v2', JSON.stringify(notes)); }

/* ══════════════════════════════════════════════════════════════
   MODAL
══════════════════════════════════════════════════════════════ */
function openModal(blockKey) {
  activeBlock = blockKey;
  editId = null;
  const b = BLOCKS.find(x => x.key === blockKey);
  document.getElementById('modal-verb').textContent = 'פתק חדש — ';
  document.getElementById('modal-block-name').textContent = b.he;
  document.getElementById('ntxt').value = '';
  document.getElementById('btn-save').textContent = 'הוסף פתק ✓';
  document.getElementById('nmetric').value = '';
  document.getElementById('nswot-answer').value = '';
  document.getElementById('swot-question').style.display = 'none';
  document.querySelectorAll('.swot-btn').forEach(b => b.classList.remove('sel'));
  chosenSwot = null;
  pickColor(chosenColor);
  document.getElementById('overlay').classList.add('open');
  setTimeout(() => document.getElementById('ntxt').focus(), 80);
}

function openEdit(id) {
  const n = notes.find(x => x.id === id);
  if (!n) return;
  editId = id;
  activeBlock = n.bk;
  const b = BLOCKS.find(x => x.key === n.bk);
  document.getElementById('modal-verb').textContent = 'עריכת פתק — ';
  document.getElementById('modal-block-name').textContent = b.he;
  document.getElementById('ntxt').value = n.text;
  document.getElementById('btn-save').textContent = 'שמור ✓';
  document.getElementById('nmetric').value = n.metric || '';
  chosenSwot = n.swot || null;
  document.querySelectorAll('.swot-btn').forEach(b => b.classList.remove('sel'));
  if (n.swot) {
    const btn = document.querySelector(`.swot-btn[data-s="${n.swot}"]`);
    if (btn) btn.classList.add('sel');
    document.getElementById('swot-q-label').textContent = SWOT_Q[n.swot];
    document.getElementById('nswot-answer').value = n.swotAnswer || '';
    document.getElementById('swot-question').style.display = '';
  } else {
    document.getElementById('swot-question').style.display = 'none';
    document.getElementById('nswot-answer').value = '';
  }
  pickColor(n.color);
  document.getElementById('overlay').classList.add('open');
  setTimeout(() => document.getElementById('ntxt').focus(), 80);
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  editId = null; activeBlock = null;
}

function onOverlayClick(e) {
  if (e.target === document.getElementById('overlay')) closeModal();
}

function saveNote() {
  const text = document.getElementById('ntxt').value.trim();
  if (!text) return;
  const metric     = document.getElementById('nmetric').value.trim();
  const swotAnswer = document.getElementById('nswot-answer').value.trim();

  if (editId) {
    const n = notes.find(x => x.id === editId);
    if (n) { n.text = text; n.color = chosenColor; n.metric = metric; n.swot = chosenSwot; n.swotAnswer = swotAnswer; }
    emit({ type:'UPD', note: { ...n } });
  } else {
    const n = { id: uid(), bk: activeBlock, text, color: chosenColor, author: myName, ts: Date.now(), metric, swot: chosenSwot, swotAnswer };
    notes.push(n);
    emit({ type:'ADD', note: n });
  }
  persist(); renderNotes(); closeModal();
}

function delNote(e, id) {
  e.stopPropagation();
  notes = notes.filter(n => n.id !== id);
  emit({ type:'DEL', id });
  persist(); renderNotes();
}

function clearAll() {
  if (!confirm('למחוק את כל הפתקים מהלוח?')) return;
  notes = [];
  emit({ type:'CLEAR' });
  persist(); renderNotes();
}

function pickColor(c, el) {
  chosenColor = c;
  document.querySelectorAll('.cdot').forEach(d => d.classList.remove('sel'));
  const dot = el || document.querySelector(`.cdot[data-c="${c}"]`);
  if (dot) dot.classList.add('sel');
}

function pickSwot(s, el) {
  if (chosenSwot === s) {
    chosenSwot = null;
    document.querySelectorAll('.swot-btn').forEach(b => b.classList.remove('sel'));
    document.getElementById('swot-question').style.display = 'none';
    return;
  }
  chosenSwot = s;
  document.querySelectorAll('.swot-btn').forEach(b => b.classList.remove('sel'));
  el.classList.add('sel');
  document.getElementById('swot-q-label').textContent = SWOT_Q[s];
  document.getElementById('swot-question').style.display = '';
}

/* ══════════════════════════════════════════════════════════════
   DRAG & DROP (move notes between blocks)
══════════════════════════════════════════════════════════════ */
function onDragStart(e, id) {
  draggingId = id;
  e.dataTransfer.effectAllowed = 'move';
  setTimeout(() => e.target.style.opacity = '.4', 0);
}
function onDragEnd(e) {
  e.target.style.opacity = '';
  draggingId = null;
  document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
}
function onDragOver(e, bk) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
  e.currentTarget.classList.add('drag-over');
}
function onDragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}
function onDrop(e, bk) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (!draggingId) return;
  const n = notes.find(x => x.id === draggingId);
  if (n && n.bk !== bk) {
    n.bk = bk;
    emit({ type:'UPD', note: { ...n } });
    persist(); renderNotes();
  }
}

/* ══════════════════════════════════════════════════════════════
   KEYBOARD
══════════════════════════════════════════════════════════════ */
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if (e.key === 'Enter' && e.ctrlKey &&
      document.getElementById('overlay').classList.contains('open')) saveNote();
});

/* ══════════════════════════════════════════════════════════════
   REALTIME COLLABORATION (Firebase)
══════════════════════════════════════════════════════════════ */

// ── הדבק כאן את ה-config מ-Firebase Console ──
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyCLx9wT4PYTUvclt4vUi7oVSEq3-EQN-pg",
  authDomain:        "bmc-canvas-95d38.firebaseapp.com",
  databaseURL:       "https://bmc-canvas-95d38-default-rtdb.firebaseio.com",
  projectId:         "bmc-canvas-95d38",
  storageBucket:     "bmc-canvas-95d38.firebasestorage.app",
  messagingSenderId: "415402661422",
  appId:             "1:415402661422:web:bad66d2defb97498b231bf"
};

let amHost = false;
let roomId = null;
let db     = null;

function getRoomFromURL() { return location.hash ? location.hash.slice(1) : null; }

function initFirebase() {
  firebase.initializeApp(FIREBASE_CONFIG);
  db = firebase.database();

  // Sign in anonymously so Security Rules (auth != null) are satisfied
  firebase.auth().signInAnonymously()
    .then(() => setupRoom())
    .catch(err => {
      console.error('Firebase auth error:', err);
      setUI('', 'שגיאת חיבור', null);
    });
}

function setupRoom() {
  const urlRoom = getRoomFromURL();

  if (!urlRoom) {
    // ── HOST ──
    amHost = true;
    document.getElementById('hdr-actions').style.display = '';
    roomId = uid();
    location.hash = roomId;
  } else {
    // ── GUEST ──
    amHost = false;
    roomId = urlRoom;
    setUI('connecting', 'מתחבר...', null);
  }

  const room = db.ref(`rooms/${roomId}`);

  // ── Sync notes in real-time ──
  room.child('notes').on('value', snap => {
    notes = snap.val() ? Object.values(snap.val()) : [];
    persist();
    renderNotes();
    setUI('online', amHost ? 'חדר פתוח' : 'מחובר ✓', null);
  });

  // ── Participant presence & count ──
  const authUid = firebase.auth().currentUser?.uid || uid();
  const myPresence = room.child(`presence/${authUid}`);
  myPresence.set(true);
  myPresence.onDisconnect().remove();
  room.child('presence').on('value', snap => {
    const count = snap.val() ? Object.keys(snap.val()).length : 1;
    setUI('online', amHost ? 'חדר פתוח' : 'מחובר ✓', count);
  });

  // ── Wind sync ──
  room.child('wind').on('value', snap => {
    if (snap.val()) {
      triggerWind(true);
      room.child('wind').remove();
    }
  });
}

function emit(msg) {
  if (!db || !roomId) return;
  const room = db.ref(`rooms/${roomId}`);
  switch (msg.type) {
    case 'ADD':
    case 'UPD':  room.child(`notes/${msg.note.id}`).set(msg.note); break;
    case 'DEL':  room.child(`notes/${msg.id}`).remove(); break;
    case 'CLEAR': room.child('notes').remove(); break;
    case 'WIND':  room.child('wind').set(Date.now()); break;
  }
}

function setUI(dotClass, label, count) {
  const dot = document.getElementById('rdot');
  const lbl = document.getElementById('rlabel');
  const cnt = document.getElementById('rcount');
  dot.className = 'room-dot ' + (dotClass || '');
  lbl.textContent = label;
  if (count !== null && count !== undefined) {
    cnt.textContent = `${count} משתתפ${count === 1 ? '' : 'ים'}`;
  } else { cnt.textContent = ''; }
}

/* ══════════════════════════════════════════════════════════════
   UTILS
══════════════════════════════════════════════════════════════ */
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

/* ── Falling note easter egg ── */
function triggerFallingNote() {
  if (!notes.length) return;
  const randomNote = notes[Math.floor(Math.random() * notes.length)];
  const el = document.querySelector(`.note[data-id="${randomNote.id}"]`);
  if (!el) return;

  el.classList.add('falling');

  setTimeout(() => {
    el.classList.remove('falling');
    el.classList.add('returning');
    el.addEventListener('animationend', () => el.classList.remove('returning'), { once: true });
  }, 2400);
}

setInterval(triggerFallingNote, 5 * 60 * 1000);

/* ── Wind button: all notes fly off and pile at bottom ── */
let windActive = false;

function triggerWind(fromPeer = false) {
  if (windActive) return;
  const els = [...document.querySelectorAll('.note:not(.falling)')];
  if (!els.length) { toast('אין פתקים ללוח'); return; }

  if (!fromPeer) emit({ type: 'WIND' });

  windActive = true;
  const windBtn = document.getElementById('btn-wind');
  windBtn.disabled = true;

  // Overlay to hold flying clones
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:500;overflow:hidden;';
  document.body.appendChild(overlay);

  const clones = els.map((el) => {
    const r = el.getBoundingClientRect();
    const c = el.cloneNode(true);
    c.style.cssText = `
      position:fixed; left:${r.left}px; top:${r.top}px;
      width:${r.width}px; height:${r.height}px;
      margin:0; animation:none !important; pointer-events:none;
      transition:none;
    `;
    overlay.appendChild(c);
    el.style.visibility = 'hidden';
    return { el, c, r };
  });

  const n = clones.length;

  // Phase 1 (0ms): wind lifts and sweeps notes sideways
  requestAnimationFrame(() => requestAnimationFrame(() => {
    clones.forEach(({ c }, i) => {
      const sweepX = (40 + Math.random() * 100) * (Math.random() > .5 ? 1 : -1);
      const sweepY = -(20 + Math.random() * 45);
      const rot    = (Math.random() > .5 ? 1 : -1) * (12 + Math.random() * 22);
      c.style.transition = `transform ${0.4 + Math.random() * .25}s cubic-bezier(.2,0,.8,.6) ${i * 0.025}s`;
      c.style.transform  = `translate(${sweepX}px, ${sweepY}px) rotate(${rot}deg)`;
    });
  }));

  // Phase 2 (620ms): notes fall and pile at the bottom
  setTimeout(() => {
    clones.forEach(({ c, r }, i) => {
      // Spread evenly across bottom, slight overlap
      const pileX   = (window.innerWidth * 0.08) + (i / Math.max(n - 1, 1)) * (window.innerWidth * 0.84) - r.left;
      const pileY   = window.innerHeight - r.top - r.height - 8;
      const finalR  = (Math.random() - .5) * 40;
      const delay   = i * 0.045;
      c.style.transition = `transform ${0.7 + Math.random() * .35}s cubic-bezier(.4,0,.6,1) ${delay}s,
                             opacity .25s ease ${0.55 + delay}s`;
      c.style.transform  = `translate(${pileX}px, ${pileY}px) rotate(${finalR}deg)`;
      c.style.opacity    = '.8';
    });
  }, 620);

  // Phase 3 (3600ms): notes fly back home
  setTimeout(() => {
    clones.forEach(({ c }, i) => {
      c.style.transition = `transform ${0.55 + Math.random() * .2}s cubic-bezier(.2,.85,.3,1.15) ${i * 0.03}s,
                             opacity .35s ease ${i * 0.03}s`;
      c.style.transform  = 'translate(0,0) rotate(0deg)';
      c.style.opacity    = '1';
    });

    // Restore originals and clean up
    const cleanup = 600 + n * 30;
    setTimeout(() => {
      clones.forEach(({ el }) => el.style.visibility = '');
      overlay.remove();
      windActive = false;
      windBtn.disabled = false;
    }, cleanup);
  }, 3600);
}

function exportCSV() {
  if (!notes.length) { toast('אין פתקים לייצוא'); return; }
  const rows = [['בלוק', 'מלל', 'מדד הצלחה', 'SWOT', 'שאלת SWOT', 'תשובת SWOT']];
  const order = BLOCKS.map(b => b.key);
  const sorted = [...notes].sort((a, b) => order.indexOf(a.bk) - order.indexOf(b.bk));
  sorted.forEach(n => {
    const blockName = BLOCKS.find(b => b.key === n.bk)?.he ?? n.bk;
    const swotQ = n.swot ? SWOT_Q[n.swot] : '';
    rows.push([blockName, n.text.replace(/\n/g, ' '), n.metric || '', n.swot || '', swotQ, n.swotAnswer || '']);
  });
  const csv = '\uFEFF' + rows.map(r => r.map(cell => `"${cell.replace(/"/g, '""')}"`).join(',')).join('\r\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'bmc_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
  URL.revokeObjectURL(a.href);
  toast('✅ הקובץ יורד...');
}

function copyLink() {
  const url = location.origin + location.pathname + location.hash;
  navigator.clipboard.writeText(url)
    .then(() => toast('🔗 קישור הועתק — שתף עם הקבוצה!'))
    .catch(() => prompt('העתק את הקישור:', url));
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2800);
}

/* ══════════════════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════════════════ */
buildGrid();
initFirebase();
</script>
